statuses:
  - key: backlog
    label: Backlog
    emoji: "\U0001F4E5"
    default: true
  - key: ready
    label: Ready
    emoji: "\U0001F4CB"
    active: true
  - key: in_progress
    label: "In Progress"
    emoji: "\u2699\uFE0F"
    active: true
  - key: review
    label: Review
    emoji: "\U0001F440"
    active: true
  - key: done
    label: Done
    emoji: "\u2705"
    done: true

views:
  # --- TikiPlugin views ---
  - name: Kanban
    description: "Active sprint board"
    default: true
    foreground: "#87ceeb"
    background: "#1a3a5c"
    key: "F1"
    lanes:
      - name: Ready
        filter: status = 'ready' and type != 'epic'
        action: status = 'ready'
      - name: In Progress
        filter: status = 'in_progress' and type != 'epic'
        action: status = 'in_progress'
      - name: Review
        filter: status = 'review' and type != 'epic'
        action: status = 'review'
      - name: Done
        filter: status = 'done' and type != 'epic'
        action: status = 'done'
    sort: Priority, CreatedAt

  - name: Backlog
    description: "Tasks waiting to be picked up"
    foreground: "#5fff87"
    background: "#0b3d2e"
    key: "F3"
    lanes:
      - name: Backlog
        columns: 4
        filter: status = 'backlog' and type != 'epic'
    actions:
      - key: "b"
        label: "Add to board"
        action: status = 'ready'
    sort: Priority, ID

  - name: Roadmap
    description: "Epics organized by Now, Next, and Later horizons"
    foreground: "#e2e8f0"
    background: "#2a5f5a"
    key: "F4"
    lanes:
      - name: Now
        columns: 1
        width: 25
        filter: type = 'epic' AND status = 'ready'
        action: status = 'ready'
      - name: Next
        columns: 1
        width: 25
        filter: type = 'epic' AND status = 'backlog' AND priority = 1
        action: status = 'backlog', priority = 1
      - name: Later
        columns: 2
        width: 50
        filter: type = 'epic' AND status = 'backlog' AND priority > 1
        action: status = 'backlog', priority = 2
    sort: Priority, Points DESC
    view: expanded

